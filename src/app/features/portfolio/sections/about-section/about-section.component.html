<section id="about" class="section about">
  <div class="container">
    <app-section-heading
      eyebrow="About Me"
      title="Engineering backend products with clarity, scalability, and measurable performance."
      description="A backend-focused profile designed to feel premium and intentional while keeping the content direct and recruiter-friendly."
    />

    <div class="about__grid">
      <article class="about__card glass-panel" appInView>
        <div class="about__stats">
          <div>
            <strong>3+ years</strong>
            <span>Building production software</span>
          </div>
          <div>
            <strong>C#, .NET Core</strong>
            <span>Primary backend technology stack</span>
          </div>
          <div>
            <strong>SQL Server + Design</strong>
            <span>Strong in data and architecture thinking</span>
          </div>
        </div>
      </article>

      <article class="about__card glass-panel" appInView>
        @for (point of aboutPoints; track point) {
          <p>{{ point }}</p>
        }
      </article>
    </div>
  </div>
</section>
